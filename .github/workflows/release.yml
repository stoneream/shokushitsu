name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release tag
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([\-+][0-9A-Za-z\.-]+)?$ ]]; then
            echo "Invalid release tag: ${RELEASE_TAG}" >&2
            echo "Expected format: vMAJOR.MINOR.PATCH (optionally with prerelease/build metadata)" >&2
            exit 1
          fi

      - name: Build release artifacts
        run: |
          set -euo pipefail

          mkdir -p dist
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r GOOS GOARCH <<< "$target"

            ext=""
            if [[ "$GOOS" == "windows" ]]; then
              ext=".exe"
            fi

            output="dist/shoku_${RELEASE_TAG}_${GOOS}_${GOARCH}${ext}"
            GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=0 go build -trimpath -o "$output" ./cmd/shoku

            if [[ "$GOOS" == "windows" ]]; then
              (cd dist && zip -q "$(basename "${output%$ext}.zip")" "$(basename "$output")")
              rm "$output"
            else
              tar -C dist -czf "${output}.tar.gz" "$(basename "$output")"
              rm "$output"
            fi
          done

          (cd dist && sha256sum * > checksums.txt)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/*
